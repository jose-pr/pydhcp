site_name: pydhcp
site_description: A Python DHCP library and server implementation
site_author: jose-pr
repo_url: https://github.com/jose-pr/pydhcp/
repo_name: jose-pr/pydhcp

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Examples: examples.md
  - Common DHCP Options: options.md
  - Deployment: deployment.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
