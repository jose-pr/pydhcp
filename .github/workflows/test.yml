name: test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
      run_benchmarks:
        description: Run the benchmark harness
        required: false
        type: boolean
        default: false
  push:
    branches:
      - '**'
    tags:
      - ci-*
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs]

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build docs
        run: python -m mkdocs build --strict

  benchmark:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_benchmarks) ||
      startsWith(github.ref, 'refs/tags/ci-bench-')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run benchmarks
        run: python benchmarks/bench_options.py --iterations 1000 --json-output benchmark-results/bench_options.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/*.json
