name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release, for example v0.3.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with all extras
        run: python -m pip install -e ".[dev,docs,toml]"

      - name: Run tests
        run: python -m pytest tests -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docs-build:
    name: Build documentation site
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/configure-pages@v5

      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,toml]"

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import os
          import pathlib
          import re
          import sys

          ref = os.environ["RELEASE_REF"]
          tag = ref.rsplit("/", 1)[-1]
          version = tag[1:] if tag.startswith("v") else tag

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name, '-') }}
          body_path: release_notes.md

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pydhcp/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
